<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SponzoBD — Live Deal Journey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#E24B4A;--red-l:#FCEBEB;--red-m:#F7C1C1;
  --grn:#1D9E75;--grn-l:#EAF3DE;--grn-m:#C0DD97;--grn-d:#085041;--grn-3:#3B6D11;--grn-t:#27500A;
  --teal-l:#E1F5EE;--teal-m:#9FE1CB;
  --blu-l:#E6F1FB;--blu-m:#B5D4F4;--blu-t:#0C447C;
  --amb-l:#FAEEDA;--amb-m:#FAC775;--amb-t:#633806;--amb-d:#854F0B;
  --pur-l:#EEEDFE;--pur-t:#3C3489;
  --bg:#F4F2EE;--srf:#FFFFFF;--srf2:#F0EEE9;
  --bdr:rgba(0,0,0,.08);--bdr-m:rgba(0,0,0,.14);
  --tx1:#1A1A1A;--tx2:#555;--tx3:#999;
  --font:'DM Sans',system-ui,sans-serif;
  --r1:7px;--r2:10px;--r3:14px;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);font-size:14px;color:var(--tx1);background:var(--bg);}
.app{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* ── LEFT PANEL — step navigator ── */
.left{width:280px;flex-shrink:0;background:var(--srf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:100vh;}
.left-hd{padding:16px 18px 12px;border-bottom:1px solid var(--bdr);}
.left-title{font-size:14px;font-weight:700;color:var(--tx1);margin-bottom:2px;}
.left-sub{font-size:11px;color:var(--tx3);}
.steps-wrap{flex:1;overflow-y:auto;padding:10px 0;}
.step-item{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;cursor:pointer;border-left:2.5px solid transparent;transition:background .1s;}
.step-item:hover{background:var(--srf2);}
.step-item.on{background:var(--srf2);border-left-color:var(--red);}
.step-item.done{opacity:.75;}
.step-item.done .s-dot{background:var(--grn-l);border-color:var(--grn-m);}
.step-item.done .s-dot svg{display:block;}
.s-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bdr-m);background:var(--srf);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.s-dot svg{display:none;width:10px;height:10px;}
.s-dot.active{background:var(--blu-l);border-color:var(--blu-t);}
.s-dot.active svg{display:block;}
.s-info{}
.s-num{font-size:10px;color:var(--tx3);margin-bottom:1px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.s-label{font-size:13px;font-weight:600;color:var(--tx1);margin-bottom:2px;}
.s-who{font-size:11px;color:var(--tx3);}
.s-who.sp{color:var(--blu-t);font-weight:600;}
.s-who.cr{color:var(--grn-3);font-weight:600;}
.s-who.pl{color:var(--pur-t);font-weight:600;}
.s-who.both{color:var(--amb-d);font-weight:600;}
.step-connector{width:1.5px;height:12px;background:var(--bdr-m);margin:0 auto;margin-left:27px;}
.step-connector.done{background:var(--grn-m);}
.left-legend{padding:12px 18px;border-top:1px solid var(--bdr);}
.leg-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:var(--tx2);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── RIGHT PANEL — chat simulation ── */
.right{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;}
.right-hd{background:var(--srf);border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rh-title{font-size:15px;font-weight:700;color:var(--tx1);}
.rh-sub{font-size:11px;color:var(--tx3);margin-top:2px;}
.step-badge{font-size:11px;padding:3px 11px;border-radius:20px;font-weight:700;}

/* progress pipe */
.pipe-bar{background:var(--srf);border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:flex-start;flex-shrink:0;}
.ps{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.ps:not(:last-child)::after{content:'';position:absolute;top:9px;left:50%;width:100%;height:2px;background:var(--srf2);z-index:0;}
.ps.done:not(:last-child)::after{background:var(--grn-m);}
.pd{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bdr-m);background:var(--srf);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.pd.done{background:var(--grn-l);border-color:var(--grn-m);}
.pd.now{background:var(--blu-l);border-color:var(--blu-t);}
.pl{font-size:9px;color:var(--tx3);margin-top:3px;text-align:center;line-height:1.3;max-width:52px;}
.pl.done{color:var(--grn-3);}
.pl.now{color:var(--blu-t);font-weight:700;}

/* chat thread */
.thread{flex:1;overflow-y:auto;padding:16px 20px 12px;display:flex;flex-direction:column;gap:12px;}

/* system events */
.sys-ev{background:var(--srf);border:1px solid var(--bdr);border-radius:var(--r2);padding:10px 15px;max-width:480px;margin:0 auto;text-align:center;}
.se-step{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.se-label{font-size:12px;font-weight:700;color:var(--tx1);margin-bottom:2px;}
.se-detail{font-size:12px;color:var(--tx2);}
.se-time{font-size:10px;color:var(--tx3);margin-top:3px;}
.se-platform{border-color:var(--pur-l);background:var(--pur-l);}
.se-platform .se-step{color:var(--pur-t);}
.se-sponsor{border-color:var(--blu-m);background:var(--blu-l);}
.se-sponsor .se-step{color:var(--blu-t);}
.se-creator{border-color:var(--grn-m);background:var(--grn-l);}
.se-creator .se-step{color:var(--grn-3);}
.se-escrow{border-color:var(--amb-m);background:var(--amb-l);}
.se-escrow .se-step{color:var(--amb-t);}
.se-complete{border-color:var(--grn-m);background:var(--grn-l);}
.se-complete .se-step{color:var(--grn-3);}

/* messages */
.msg-wrap{display:flex;gap:9px;align-items:flex-end;}
.msg-wrap.sp{flex-direction:row-reverse;}
.m-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.av-cr{background:var(--teal-m);color:var(--grn-d);}
.av-sp{background:var(--blu-l);color:var(--blu-t);}
.av-pl{background:var(--pur-l);color:var(--pur-t);}
.bubble{max-width:62%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.6;}
.b-cr{background:var(--srf);border:1px solid var(--bdr);color:var(--tx1);border-bottom-left-radius:4px;}
.b-sp{background:var(--blu-l);color:var(--blu-t);border-bottom-right-radius:4px;}
.b-pl{background:var(--pur-l);color:var(--pur-t);border-bottom-right-radius:4px;font-size:12px;}
.msg-t{font-size:10px;color:var(--tx3);margin-top:3px;}
.msg-t.r{text-align:right;}

/* cards */
.terms-card{background:var(--srf);border:1px solid var(--grn-m);border-radius:var(--r3);padding:13px 15px;max-width:68%;}
.tc-hd{font-size:12px;font-weight:700;color:var(--grn-3);margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.tc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px;}
.tc-row:last-of-type{border-bottom:none;}
.tc-l{color:var(--tx2);}
.tc-v{font-weight:700;color:var(--tx1);}
.tc-badge{font-size:11px;padding:3px 9px;border-radius:20px;margin-top:9px;display:inline-flex;align-items:center;gap:4px;font-weight:700;}
.tc-pend{background:var(--amb-l);color:var(--amb-t);}
.tc-acc{background:var(--grn-l);color:var(--grn-3);}
.tc-actions{display:flex;gap:7px;margin-top:10px;}

.deal-record{background:var(--srf);border:2px solid var(--grn-m);border-radius:var(--r3);padding:14px 16px;max-width:72%;}
.dr-hd{font-size:13px;font-weight:700;color:var(--grn-d);margin-bottom:11px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bdr);padding-bottom:9px;}
.dr-section{margin-bottom:10px;}
.dr-sec-t{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.dr-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:12px;}
.dr-row:last-child{border-bottom:none;}
.dr-l{color:var(--tx2);}
.dr-v{font-weight:700;color:var(--tx1);}
.dr-v.grn{color:var(--grn-3);}
.dr-v.red{color:var(--red);}
.dr-sig{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr-m);gap:10px;}
.dr-sig-item{flex:1;background:var(--srf2);border-radius:var(--r1);padding:8px 10px;font-size:11px;}
.dr-sig-name{font-weight:700;color:var(--tx1);margin-bottom:2px;}
.dr-sig-time{color:var(--tx3);}
.dr-sig-check{color:var(--grn-3);font-weight:700;font-size:10px;margin-top:3px;}

.escrow-card{background:var(--amb-l);border:1px solid var(--amb-m);border-radius:var(--r3);padding:13px 15px;max-width:68%;}
.esc-hd{font-size:12px;font-weight:700;color:var(--amb-t);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.esc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:12px;}
.esc-row:last-of-type{border-bottom:none;}
.esc-l{color:var(--amb-t);}
.esc-v{font-weight:700;color:var(--amb-d);}

.content-card{background:var(--srf);border:1px solid var(--bdr-m);border-radius:var(--r3);overflow:hidden;max-width:68%;}
.cc-thumb{width:100%;height:110px;background:linear-gradient(135deg,var(--grn-l) 0%,var(--teal-l) 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;}
.cc-body{padding:10px 12px;}
.cc-hd{font-size:12px;font-weight:700;color:var(--tx1);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.cc-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);padding:3px 0;border-bottom:1px solid var(--bdr);}
.cc-item:last-child{border-bottom:none;}
.cc-link{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--blu-t);font-weight:600;padding:6px 10px;background:var(--blu-l);border-radius:var(--r1);margin:8px 0;text-decoration:none;}
.cc-note{font-size:11px;color:var(--tx2);background:var(--srf2);border-radius:var(--r1);padding:7px 10px;margin-bottom:8px;line-height:1.55;border-left:2px solid var(--bdr-m);}
.csc-pend{background:var(--amb-l);color:var(--amb-t);font-size:11px;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;font-weight:700;}
.csc-actions{display:flex;gap:7px;margin-top:8px;}

.payment-card{background:var(--grn-l);border:2px solid var(--grn-m);border-radius:var(--r3);padding:14px 16px;max-width:68%;}
.pc-hd{font-size:13px;font-weight:700;color:var(--grn-d);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.pc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.07);font-size:12px;}
.pc-row:last-child{border-bottom:none;font-weight:700;font-size:13px;}
.pc-l{color:var(--grn-t);}
.pc-v{font-weight:700;color:var(--grn-d);}
.sf{width:11px;height:11px;background:#EF9F27;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}

/* nav controls */
.nav-bar{background:var(--srf);border-top:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-info{font-size:12px;color:var(--tx3);}
.nav-info b{color:var(--tx1);font-weight:700;}
.nav-btns{display:flex;gap:8px;}
.btn-nav{padding:8px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .12s;}
.btn-prev{background:var(--srf);border:1px solid var(--bdr-m);color:var(--tx2);}
.btn-prev:hover{background:var(--srf2);}
.btn-next{background:var(--red);border:none;color:#fff;}
.btn-next:hover{background:#c73c3b;}
.btn-next:disabled{background:var(--bdr-m);cursor:default;}
.play-btn{padding:7px 14px;border-radius:var(--r2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--grn-l);border:1px solid var(--grn-m);color:var(--grn-3);}
.play-btn:hover{background:var(--grn-m);}
.play-btn.playing{background:var(--amb-l);border-color:var(--amb-m);color:var(--amb-t);}

/* btn-ghost, btn-g, btn-r shared */
.btn-r{padding:7px 13px;background:var(--red);border:none;border-radius:var(--r1);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-g{padding:7px 13px;background:var(--grn-l);border:1px solid var(--grn-m);border-radius:var(--r1);color:var(--grn-t);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);}
.btn-a{padding:7px 13px;background:var(--amb-l);border:1px solid var(--amb-m);border-radius:var(--r1);color:var(--amb-t);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);}
.btn-ghost{padding:6px 12px;border:1px solid var(--bdr-m);border-radius:var(--r1);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;font-family:var(--font);}
.btn-ghost:hover{background:var(--srf2);}
</style>
</head>
<body>
<div class="app">

<!-- LEFT — step nav -->
<div class="left">
  <div class="left-hd">
    <div class="left-title">Deal journey walkthrough</div>
    <div class="left-sub">GreenFresh BD × Lamia Akter · ৳35,000</div>
  </div>
  <div class="steps-wrap" id="steps-wrap"></div>
  <div class="left-legend">
    <div class="leg-title">Who acts</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--blu-t);"></div>Sponsor action</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--grn-3);"></div>Creator action</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--pur-t);"></div>Platform automated</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--amb-d);"></div>Both parties</div>
  </div>
</div>

<!-- RIGHT — chat view -->
<div class="right">
  <div class="right-hd">
    <div>
      <div class="rh-title" id="rh-title">Step 1 of 9</div>
      <div class="rh-sub" id="rh-sub">National Health Week · GreenFresh BD × Lamia Akter</div>
    </div>
    <div id="step-badge"></div>
  </div>

  <!-- pipeline bar -->
  <div class="pipe-bar" id="pipe-bar"></div>

  <!-- thread -->
  <div class="thread" id="thread"></div>

  <!-- nav -->
  <div class="nav-bar">
    <div class="nav-info" id="nav-info"></div>
    <div class="nav-btns">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶ Auto-play</button>
      <button class="btn-nav btn-prev" onclick="go(-1)">← Previous</button>
      <button class="btn-nav btn-next" id="btn-next" onclick="go(1)">Next step →</button>
    </div>
  </div>
</div>
</div>

<script>
const PIPE_STAGES = ['Applied','Accepted','Terms proposed','Terms agreed','Deal record signed','Escrow funded','Work in progress','Content submitted','Approval','Paid out'];

const STEPS = [
  {
    id: 0,
    label: 'Application submitted',
    who: 'cr',
    whoLabel: 'Creator',
    pipeStage: 0,
    badge: { text: 'Stage 1 · Applied', bg: 'var(--srf2)', col: 'var(--tx2)' },
    events: [
      { type: 'sys', cls: 'se-creator', step: 'Stage 1 — Creator', label: 'Application submitted', detail: 'Lamia Akter applied to National Health Week Campaign 2025', time: 'Mar 14 · 9:00 AM' },

  {

    ]
  },
  {
    id: 3,
    label: 'Both parties agree on terms',
    who: 'both',
    whoLabel: 'Both parties',
    pipeStage: 3,
    badge: { text: 'Stage 4 · Terms agreed', bg: 'var(--grn-l)', col: 'var(--grn-3)' },
    events: [
      { type: 'msg', side: 'sp', text: 'These terms work perfectly for us. ৳35,000 is within our budget and the deliverables match our brief exactly. Accepting now.', time: 'Mar 16 · 9:00 AM' },
      {
        type: 'terms-proposed',
        side: 'cr',
        terms: {
          Rate: '৳35,000',
          Deliverables: '2 Instagram reels · 3 stories · 1 YouTube short',
          Deadline: 'March 22, 2025',
          'Revision rounds': '1 included · 7 days to review',
          'Usage rights': '3 months · Bangladesh only',
          'Content language': 'Bangla + English',
        },
        proposer: 'Lamia Akter',
        status: 'acc',
        time: 'Mar 15 · 12:00 PM'
      },
      { type: 'sys', cls: 'se-complete', step: 'Stage 4 — Both parties', label: 'Terms agreed · deal record being generated', detail: 'Both parties have accepted the same version of the terms. Platform is generating the deal record.', time: 'Mar 16 · 9:02 AM' },
    ]
  },
  {
    id: 4,
    label: 'Deal record signed by both',
    who: 'both',
    whoLabel: 'Both parties',
    pipeStage: 4,
    badge: { text: 'Stage 5 · Deal record', bg: 'var(--pur-l)', col: 'var(--pur-t)' },
    events: [
      { type: 'sys', cls: 'se-platform', step: 'Platform · Automated', label: 'Deal record generated', detail: 'A structured deal record has been created and sent to both parties for confirmation', time: 'Mar 16 · 9:03 AM' },
      {
        type: 'deal-record',
        time: 'Mar 16 · 9:03 AM'
      },
      { type: 'msg', side: 'pl', text: '🔔 Platform notice: This deal record is a binding platform agreement. Both parties must confirm before escrow can be funded. IP addresses and timestamps are logged on confirmation.', time: 'Mar 16 · 9:04 AM' },
      { type: 'sys', cls: 'se-complete', step: 'Stage 5 — Both confirmed', label: 'Deal record confirmed by both parties', detail: 'GreenFresh BD confirmed · 9:05 AM · Lamia Akter confirmed · 9:04 AM · Deal is locked. Terms cannot be changed.', time: 'Mar 16 · 9:05 AM' },
    ]
  },
  {
    id: 5,
    label: 'Sponsor funds escrow',
    who: 'sp',

function renderStepNav() {
  const wrap = document.getElementById('steps-wrap');
  wrap.innerHTML = STEPS.map(function(s, i) {
    const isDone = i < current;
    const isOn = i === current;
    const dotCls = isDone ? 's-dot' : isOn ? 's-dot active' : 's-dot';
    const itemCls = 'step-item' + (isDone ? ' done' : '') + (isOn ? ' on' : '');
    const whoCls = { sp: 'sp', cr: 'cr', pl: 'pl', both: 'both' }[s.who];
    const whoLabel = { sp: 'Sponsor action', cr: 'Creator action', pl: 'Platform automated', both: 'Both parties' }[s.who];
    const dotInner = isDone
      ? '<svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2 2L8.5 2" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : isOn
      ? '<svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="2.5" fill="var(--blu-t)"/></svg>'
      : '';
    const connector = i < STEPS.length - 1
      ? '<div class="step-connector' + (isDone ? ' done' : '') + '"></div>'
      : '';
    return '<div class="' + itemCls + '" onclick="jumpTo(' + i + ')">'
      + '<div class="' + dotCls + '">' + dotInner + '</div>'
      + '<div class="s-info"><div class="s-num">Step ' + (i+1) + ' of ' + STEPS.length + '</div><div class="s-label">' + s.label + '</div><div class="s-who ' + whoCls + '">' + whoLabel + '</div></div>'
      + '</div>'
      + connector;
  }).join('');
}

function renderPipe() {

    const dotInner = done
      ? '<svg width="8" height="8" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2 2L7.5 2" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'

function renderHeader() {
  const s = STEPS[current];
  document.getElementById('rh-title').textContent = 'Step ' + (current+1) + ' of ' + STEPS.length + ' — ' + s.label;
  const b = s.badge;
  document.getElementById('step-badge').innerHTML = '<span class="step-badge" style="background:' + b.bg + ';color:' + b.col + ';">' + b.text + '</span>';
  document.getElementById('nav-info').innerHTML = '<b>' + s.label + '</b> · ' + ({ sp:'Sponsor', cr:'Creator', pl:'Platform', both:'Both parties' }[s.who]) + ' acts here';
  document.getElementById('btn-next').disabled = current >= STEPS.length - 1;
  document.getElementById('btn-next').textContent = current >= STEPS.length - 1 ? 'Journey complete ✓' : 'Next step →';
}

function render() {
  renderStepNav();
  renderPipe();
  renderThread();
  renderHeader();
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= STEPS.length) return;
  current = next;
  render();
}

function jumpTo(i) {
  current = i;
  render();
}

function togglePlay() {
  const btn = document.getElementById('play-btn');
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
    btn.textContent = '▶ Auto-play';
    btn.classList.remove('playing');
  } else {
    btn.textContent = '⏸ Pause';
    btn.classList.add('playing');
    playInterval = setInterval(function() {
      if (current >= STEPS.length - 1) {
        clearInterval(playInterval);
        playInterval = null;
        btn.textContent = '▶ Auto-play';
        btn.classList.remove('playing');
        return;
      }
      go(1);
    }, 3200);
  }
}

render();
