<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SponzoBD — My Campaigns & Deals</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --red: #e24b4a;
        --red-l: #fcebeb;
        --red-m: #f7c1c1;
        --grn: #1d9e75;
        --grn-l: #eaf3de;
        --grn-m: #c0dd97;
        --grn-d: #085041;
        --grn-3: #3b6d11;
        --grn-t: #27500a;
        --teal-l: #e1f5ee;
        --teal-m: #9fe1cb;
        --blu-l: #e6f1fb;
        --blu-m: #b5d4f4;
        --blu-t: #0c447c;
        --amb-l: #faeeda;
        --amb-m: #fac775;
        --amb-t: #633806;
        --amb-d: #854f0b;
        --pur-l: #eeedfe;
        --pur-t: #3c3489;
        --bg: #f4f2ee;
        --srf: #ffffff;
        --srf2: #f0eee9;
        --bdr: rgba(0, 0, 0, 0.08);
        --bdr-m: rgba(0, 0, 0, 0.14);
        --bdr-s: rgba(0, 0, 0, 0.22);
        --tx1: #1a1a1a;
        --tx2: #555;
        --tx3: #999;
        --font: "DM Sans", system-ui, sans-serif;
        --r1: 7px;
        --r2: 10px;
        --r3: 14px;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: var(--font);
        font-size: 14px;
        color: var(--tx1);
        background: var(--bg);
      }
      .app {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* SIDEBAR */
      .sb {
        width: 220px;
        flex-shrink: 0;
        background: var(--srf);
        border-right: 1px solid var(--bdr);
        display: flex;
        flex-direction: column;
      }
      .sb-logo {
        padding: 15px 16px 12px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .logo-ic {
        width: 28px;
        height: 28px;
        background: var(--red);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sb-user {
        padding: 11px 16px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .av-s {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--blu-l);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--blu-t);
        flex-shrink: 0;
      }
      .u-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--tx1);
      }
      .u-sub {
        font-size: 11px;
        color: var(--tx3);
      }
      .u-plan {
        font-size: 11px;
        color: var(--blu-t);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
      }
      .pdot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--blu-t);
      }
      .nav {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .nav-sec {
        padding: 5px 16px 3px;
        font-size: 10px;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
      }
      .ni {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        font-size: 13px;
        color: var(--tx2);
        cursor: pointer;
        border-left: 2.5px solid transparent;
        transition: background 0.1s;
      }
      .ni:hover {
        background: var(--srf2);
      }
      .ni.on {
        background: var(--srf2);
        color: var(--tx1);
        font-weight: 600;
        border-left-color: var(--red);
      }
      .ni svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.5;
      }
      .ni.on svg {
        opacity: 1;
      }
      .ni-badge {
        margin-left: auto;
        background: var(--red);
        color: #fff;
        font-size: 10px;
        padding: 1px 7px;
        border-radius: 20px;
        font-weight: 700;
      }
      .sb-tier {
        margin: 0 10px 14px;
        padding: 10px 12px;
        background: var(--blu-l);
        border-radius: var(--r2);
      }
      .st-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .st-lbl {
        font-size: 12px;
        font-weight: 600;
        color: var(--blu-t);
      }
      .st-plan {
        font-size: 11px;
        font-weight: 700;
        color: var(--blu-t);
        background: var(--blu-m);
        padding: 1px 8px;
        border-radius: 20px;
      }
      .st-bar {
        height: 3px;
        background: rgba(0, 0, 0, 0.12);
        border-radius: 2px;
        margin: 4px 0;
      }
      .st-fill {
        height: 3px;
        background: var(--blu-t);
        border-radius: 2px;
        width: 66%;
      }
      .st-note {
        font-size: 11px;
        color: var(--blu-t);
        opacity: 0.8;
      }

      /* MAIN */
      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      .topbar {
        height: 52px;
        background: var(--srf);
        border-bottom: 1px solid var(--bdr);
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .tb-t {
        font-size: 15px;
        font-weight: 700;
        color: var(--tx1);
        letter-spacing: -0.2px;
      }
      .tb-r {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .badge-pro {
        background: var(--blu-l);
        color: var(--blu-t);
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 700;
      }
      .post-btn {
        padding: 8px 16px;
        background: var(--red);
        border: none;
        border-radius: var(--r1);
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .post-btn:hover {
        background: #c73c3b;
      }

      /* TABS */
      .tab-row {
        background: var(--srf);
        border-bottom: 1px solid var(--bdr);
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 0;
        flex-shrink: 0;
      }
      .tab {
        padding: 12px 18px;
        font-size: 13px;
        font-weight: 500;
        color: var(--tx3);
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        margin-bottom: -1px;
        transition: color 0.1s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tab:hover {
        color: var(--tx2);
      }
      .tab.on {
        color: var(--tx1);
        font-weight: 700;
        border-bottom-color: var(--red);
      }
      .tab-count {
        font-size: 10px;
        padding: 1px 7px;
        border-radius: 20px;
        background: var(--srf2);
        color: var(--tx3);
        font-weight: 700;
      }
      .tab.on .tab-count {
        background: var(--red);
        color: #fff;
      }

      /* CONTENT */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 18px 20px 28px;
      }

      /* FILTER BAR */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 5px 13px;
        border: 1px solid var(--bdr-m);
        border-radius: 20px;
        font-size: 12px;
        color: var(--tx2);
        cursor: pointer;
        background: transparent;
        font-family: var(--font);
        transition: all 0.1s;
      }
      .filter-btn:hover {
        background: var(--srf2);
      }
      .filter-btn.on {
        background: var(--grn-l);
        border-color: var(--grn-m);
        color: var(--grn-3);
        font-weight: 600;
      }
      .filter-bar-r {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .search-inp {
        padding: 6px 12px;
        border: 1px solid var(--bdr-m);
        border-radius: 20px;
        background: var(--srf);
        color: var(--tx1);
        font-size: 12px;
        width: 160px;
        font-family: var(--font);
      }
      .search-inp:focus {
        outline: none;
        border-color: var(--grn);
      }

      /* COMMON CARD */
      .card {
        background: var(--srf);
        border: 1px solid var(--bdr);
        border-radius: var(--r3);
        margin-bottom: 10px;
        overflow: hidden;
      }
      .card:last-child {
        margin-bottom: 0;
      }
      .card.urgent {
        border-left: 3px solid var(--red);
      }
      .card.action {
        border-left: 3px solid #ef9f27;
      }
      .card.ok {
        border-left: 3px solid var(--grn);
      }
      .card-hd {
        padding: 13px 16px 11px;
        display: flex;
        align-items: flex-start;
        gap: 11px;
      }
      .card-logo {
        width: 36px;
        height: 36px;
        border-radius: var(--r2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
        border: 1px solid var(--bdr);
      }
      .card-body {
        flex: 1;
        min-width: 0;
      }
      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx1);
        margin-bottom: 3px;
      }
      .card-sub {
        font-size: 12px;
        color: var(--tx2);
        margin-bottom: 7px;
      }
      .card-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
      }
      .pill {
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 20px;
        font-weight: 500;
      }
      .p-live {
        background: var(--grn-l);
        color: var(--grn-3);
      }
      .p-paused {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .p-closed {
        background: var(--srf2);
        color: var(--tx3);
      }
      .p-cat {
        background: var(--blu-l);
        color: var(--blu-t);
      }
      .p-plat {
        background: var(--srf2);
        color: var(--tx2);
      }
      .p-loc {
        background: var(--srf2);
        color: var(--tx2);
      }
      .p-hot {
        background: var(--red-l);
        color: var(--red);
        font-weight: 700;
      }
      .card-meta {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .cm {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: var(--tx3);
      }
      .cm svg {
        width: 11px;
        height: 11px;
        opacity: 0.4;
      }
      .cm.red {
        color: var(--red);
        font-weight: 700;
        opacity: 1;
      }
      .cm.amb {
        color: var(--amb-d);
        font-weight: 600;
        opacity: 1;
      }
      .cm.grn {
        color: var(--grn-3);
        font-weight: 600;
      }
      .card-r {
        flex-shrink: 0;
        text-align: right;
      }
      .card-budget {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx1);
      }
      .card-budget-lbl {
        font-size: 10px;
        color: var(--tx3);
        margin-top: 2px;
      }
      .card-days {
        font-size: 12px;
        font-weight: 700;
        color: var(--red);
        margin-top: 4px;
      }

      /* CAMPAIGN ACTIONS STRIP */
      .camp-actions {
        padding: 0 16px 12px;
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        align-items: center;
      }
      .ca-note {
        font-size: 11px;
        color: var(--tx3);
        margin-left: auto;
      }

      /* TOGGLE EXPAND */
      .expand-row {
        padding: 8px 16px;
        border-top: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        background: var(--srf2);
      }
      .expand-row:hover {
        background: #e8e5e0;
      }
      .expand-lbl {
        font-size: 12px;
        color: var(--tx2);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .expand-lbl svg {
        transition: transform 0.2s;
      }
      .expand-lbl.open svg {
        transform: rotate(180deg);
      }

      /* EXPANDED DEAL AREA */
      .deal-area {
        display: none;
        border-top: 1px solid var(--bdr);
      }
      .deal-area.on {
        display: block;
      }
      .deal-area-hd {
        display: grid;
        grid-template-columns: minmax(0, 1.8fr) 110px 80px 80px 90px;
        gap: 8px;
        padding: 8px 16px;
        border-bottom: 1px solid var(--bdr);
        background: var(--srf2);
      }
      .dah {
        font-size: 10px;
        font-weight: 700;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .dah:not(:first-child) {
        text-align: right;
      }
      .deal-row {
        display: grid;
        grid-template-columns: minmax(0, 1.8fr) 110px 80px 80px 90px;
        gap: 8px;
        padding: 9px 16px;
        border-bottom: 1px solid var(--bdr);
        align-items: center;
      }
      .deal-row:last-child {
        border-bottom: none;
      }
      .deal-row.urgent-row {
        background: var(--red-l);
      }
      .deal-row.action-row {
        background: var(--amb-l);
      }
      .dr-creator {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dr-av {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .dr-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--tx1);
      }
      .dr-meta {
        font-size: 10px;
        color: var(--tx3);
        margin-top: 1px;
      }
      .stage-pill {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 600;
        text-align: right;
        display: inline-block;
      }
      .sp-neg {
        background: var(--srf2);
        color: var(--tx2);
      }
      .sp-escrow {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .sp-work {
        background: var(--pur-l);
        color: var(--pur-t);
      }
      .sp-review {
        background: var(--red-l);
        color: var(--red);
      }
      .sp-done {
        background: var(--grn-l);
        color: var(--grn-3);
      }
      .dr-amt {
        font-size: 13px;
        font-weight: 700;
        color: var(--grn-3);
        text-align: right;
      }
      .dr-amt.tbd {
        color: var(--tx3);
        font-weight: 400;
        font-size: 12px;
      }
      .dr-act {
        display: flex;
        justify-content: flex-end;
      }

      /* DEAL DETAIL CARD (for Deals tab) */
      .deal-card {
        background: var(--srf);
        border: 1px solid var(--bdr);
        border-radius: var(--r3);
        margin-bottom: 10px;
        overflow: hidden;
      }
      .deal-card.urgent {
        border-left: 3px solid var(--red);
      }
      .deal-card.action {
        border-left: 3px solid #ef9f27;
      }
      .deal-card.ok {
        border-left: 3px solid var(--grn);
      }
      .deal-card-hd {
        padding: 13px 16px 11px;
        display: flex;
        align-items: flex-start;
        gap: 11px;
      }
      .dc-logo {
        width: 36px;
        height: 36px;
        border-radius: var(--r2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
        border: 1px solid var(--bdr);
      }
      .dc-main {
        flex: 1;
        min-width: 0;
      }
      .dc-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx1);
        margin-bottom: 2px;
      }
      .dc-camp {
        font-size: 12px;
        color: var(--tx2);
        margin-bottom: 8px;
      }
      .dc-r {
        text-align: right;
        flex-shrink: 0;
      }
      .dc-amt {
        font-size: 16px;
        font-weight: 700;
        color: var(--grn-3);
      }
      .dc-esc {
        font-size: 10px;
        color: var(--tx3);
        margin-top: 2px;
      }

      /* PIPELINE */
      .pipeline {
        display: flex;
        align-items: flex-start;
        padding: 0 16px 12px;
      }
      .ps {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }
      .ps:not(:last-child)::after {
        content: "";
        position: absolute;
        top: 9px;
        left: 50%;
        width: 100%;
        height: 1.5px;
        background: var(--bdr-m);
        z-index: 0;
      }
      .ps.done:not(:last-child)::after {
        background: var(--grn-m);
      }
      .pd {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1.5px solid var(--bdr-m);
        background: var(--srf);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
      .pd.done {
        background: var(--grn-l);
        border-color: var(--grn-m);
      }
      .pd.now {
        background: var(--blu-l);
        border-color: #378add;
      }
      .pl {
        font-size: 9px;
        color: var(--tx3);
        margin-top: 3px;
        text-align: center;
        line-height: 1.3;
        max-width: 52px;
      }
      .pl.done {
        color: var(--grn-3);
      }
      .pl.now {
        color: #185fa5;
        font-weight: 700;
      }

      /* DEAL FOOTER */
      .deal-foot {
        padding: 10px 16px;
        border-top: 1px solid var(--bdr);
        background: var(--srf2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .df-info {
        font-size: 11px;
        color: var(--tx3);
      }
      .df-info.red {
        color: var(--red);
        font-weight: 600;
      }
      .df-info.grn {
        color: var(--grn-3);
        font-weight: 600;
      }
      .df-info.amb {
        color: var(--amb-d);
        font-weight: 600;
      }
      .df-actions {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      /* DELIVERABLES */
      .deliv-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 0 16px 12px;
      }
      .dv {
        background: var(--srf2);
        border-radius: var(--r2);
        padding: 8px 11px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .dv-name {
        font-size: 12px;
        color: var(--tx2);
      }
      .dv-status {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 20px;
        font-weight: 600;
      }
      .dvs-pend {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .dvs-done {
        background: var(--grn-l);
        color: var(--grn-3);
      }

      /* INSIGHT */
      .insight {
        margin: 0 16px 12px;
        padding: 8px 11px;
        border-radius: var(--r1);
        display: flex;
        align-items: flex-start;
        gap: 7px;
        font-size: 12px;
        line-height: 1.55;
      }
      .insight svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .ins-g {
        background: var(--grn-l);
        color: var(--grn-t);
      }
      .ins-a {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .ins-r {
        background: var(--red-l);
        color: #791f1f;
      }
      .ins-b {
        background: var(--blu-l);
        color: var(--blu-t);
      }

      /* EMPTY */
      .empty {
        text-align: center;
        padding: 52px 20px;
      }
      .empty-ic {
        width: 48px;
        height: 48px;

      }
      function searchCamps(q) {
        campSearch = q;
        renderCamps();
      }

      // ── DEAL FILTERS ──
      function filterDeals(f, el) {
        dealFilter = f;
        document
          .querySelectorAll("[data-fd]")
          .forEach((b) => b.classList.remove("on"));
        el.classList.add("on");
        renderDeals();
      }

      // ── TOGGLE CAMPAIGN EXPAND ──
      function toggleCamp(id) {
        if (expandedCamps.has(id)) expandedCamps.delete(id);
        else expandedCamps.add(id);
        renderCamps();
        setTimeout(() => {
          const el = document.getElementById("cc-" + id);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 60);
      }

      // ── RENDER CAMPAIGNS ──
      function renderCamps() {
        let list =
          campFilter === "all"
            ? [...campaigns]
            : campaigns.filter((c) => c.status === campFilter);
        if (campSearch)
          list = list.filter((c) =>
            c.name.toLowerCase().includes(campSearch.toLowerCase()),
          );
        const el = document.getElementById("camps-list");
        if (!list.length) {
          el.innerHTML =
            '<div class="empty"><div class="empty-ic"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".35"><rect x="2" y="3" width="16" height="14" rx="2"/><path d="M7 8h6M7 12h4"/></svg></div><div class="empty-t">No campaigns found</div><div class="empty-s">Try a different filter or post your first campaign.</div></div>';
          return;
        }
        el.innerHTML = list.map((c) => buildCampCard(c)).join("");
      }

      function buildCampCard(c) {
        const isOpen = expandedCamps.has(c.id);
        const statusPill =
          c.status === "live"
            ? '<span class="pill p-live">Live</span>'
            : c.status === "paused"
              ? '<span class="pill p-paused">Paused</span>'
              : '<span class="pill p-closed">Closed</span>';
        const hotPill = c.closingHot
          ? '<span class="pill p-hot">🔥 Closing tomorrow</span>'
          : "";
        const platPills = c.plats
          .map((p) => '<span class="pill p-plat">' + p + "</span>")
          .join("");
        const daysLabel =
          c.status === "live"
            ? c.days <= 3
              ? '<div class="cm red"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="5.5" cy="5.5" r="4"/><path d="M5.5 3v2.5l1.5 1"/></svg>' +
                c.days +
                " day" +
                (c.days !== 1 ? "s" : "") +
                " left</div>"
              : '<div class="cm"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="5.5" cy="5.5" r="4"/><path d="M5.5 3v2.5l1.5 1"/></svg>' +
                c.days +
                " days left</div>"
            : "";
        const appsLabel =
          c.apps > 0
            ? '<div class="cm' +
              (c.status === "live" ? " amb" : "") +
              '"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1.5 9c0-2 1.5-3 4-3s4 1 4 3"/><circle cx="5.5" cy="3.5" r="2"/></svg>' +
              c.apps +
              " applicants</div>"
            : '<div class="cm"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1.5 9c0-2 1.5-3 4-3s4 1 4 3"/><circle cx="5.5" cy="3.5" r="2"/></svg>No applicants</div>';
        const dealsLabel =
          c.deals > 0
            ? '<div class="cm grn"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1.5 5.5l2 2L9.5 2"/></svg>' +
              c.deals +
              " deal" +
              (c.deals !== 1 ? "s" : "") +
              " · " +
              (c.spent
                ? "৳" + (c.spent / 1000).toFixed(0) + "K paid"
                : "negotiating") +
              "</div>"
            : '<div class="cm"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1.5 5.5l2 2L9.5 2"/></svg>No deals yet</div>';
        const pauseNote = c.pauseNote
          ? '<div style="font-size:11px;color:var(--amb-d);background:var(--amb-l);padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;margin-top:5px;">⏸ ' +
            c.pauseNote +
            "</div>"
          : "";
        const urgCls =
          c.status === "live" && c.days <= 2
            ? "urgent"
            : c.status === "live" && c.apps > 10
              ? "action"
              : c.status === "live"
                ? "ok"
                : "";
        let actionBtns = "";
        if (c.status === "live")
          actionBtns =
            '<button class="btn-r" onclick="showToast(\'Opening applicant review for: ' +
            c.name.replace(/'/g, "") +
            "')\">Review " +
            c.apps +
            ' applicants</button><button class="btn-ghost" onclick="showToast(\'Opening messages...\')">Open messages</button><button class="btn-ghost" onclick="showToast(\'Editing campaign brief...\')">Edit brief</button><button class="btn-ghost" onclick="showToast(\'Campaign paused\')">Pause</button>';
        else if (c.status === "paused")
          actionBtns =
            '<button class="btn-amb" onclick="showToast(\'Campaign resumed\')">Resume campaign</button><button class="btn-ghost" onclick="showToast(\'Editing brief...\')">Edit brief</button><button class="btn-ghost" onclick="showToast(\'Campaign closed\')">Close</button>';
        else
          actionBtns =
            '<button class="btn-b" onclick="showToast(\'Form pre-filled with previous brief — review and publish\')">Repost campaign</button><button class="btn-ghost" onclick="showToast(\'Viewing campaign summary...\')">View summary</button>';

        const campDeals = deals.filter((d) => d.campName === c.name);
        let dealRowsHTML = "";
        if (campDeals.length > 0) {
          const rows = campDeals
            .map(function (d) {
              const stageCls =
                {
                  neg: "sp-neg",
                  escrow: "sp-escrow",
                  work: "sp-work",
                  review: "sp-review",
                  released: "sp-done",
                }[d.stage] || "sp-neg";
              const rowCls =
                d.urgency === "urgent"
                  ? "deal-row urgent-row"
                  : d.urgency === "action"
                    ? "deal-row action-row"
                    : "deal-row";
              const amtTxt = d.amt ? "৳" + d.amt.toLocaleString() : "TBD";
              const amtCls = d.amt ? "dr-amt" : "dr-amt tbd";
              let actBtn = "";
              if (d.stage === "review")
                actBtn =
                  '<button class="btn-r" onclick="showToast(\'Opening content review...\')">Approve</button>';
              else if (d.stage === "escrow")
                actBtn =
                  '<button class="btn-r" onclick="showToast(\'Opening escrow payment...\')">Fund escrow</button>';
              else if (d.stage === "neg")
                actBtn =
                  '<button class="btn-amb" onclick="showToast(\'Opening negotiation...\')">Respond</button>';
              else if (d.stage === "work")
                actBtn =
                  '<button class="btn-ghost" style="opacity:.6;cursor:default;">In progress</button>';
              else
                actBtn =
                  '<button class="btn-ghost" onclick="showToast(\'Viewing receipt...\')">Receipt</button>';
              return (
                '<div class="' +
                rowCls +
                '">' +
                '<div class="dr-creator"><div class="dr-av" style="background:' +
                d.avBg +
                ";color:" +
                d.avCol +
                ';">' +
                d.avIn +
                '</div><div><div class="dr-name">' +
                d.creatorCat +
                '</div><div class="dr-meta">' +
                d.creatorFol +
                " · " +
                d.creatorPlat +
                "</div></div></div>" +
                '<div style="text-align:right;"><span class="stage-pill ' +
                stageCls +
                '">' +
                d.stageLabel +
                "</span></div>" +
                '<div class="' +
                amtCls +
                '">' +
                amtTxt +
                "</div>" +
                '<div style="text-align:right;">' +
                (d.escrowHeld
                  ? '<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--grn-l);color:var(--grn-3);font-weight:700;">Escrow held</span>'
                  : '<span style="font-size:10px;color:var(--tx3);">—</span>') +
                "</div>" +
                '<div class="dr-act">' +
                actBtn +
                "</div>" +
                "</div>"
              );
            })
            .join("");
          dealRowsHTML =
            '<div class="deal-area-hd"><div class="dah">Creator</div><div class="dah">Stage</div><div class="dah">Amount</div><div class="dah">Escrow</div><div class="dah">Action</div></div>' +
            rows;
        } else {
          dealRowsHTML =
            '<div style="padding:18px 16px;text-align:center;font-size:12px;color:var(--tx3);">No deals from this campaign yet · review applicants to start</div>';
        }

        const insightIcon =
          c.status === "live" && c.days <= 2
            ? '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="#F7C1C1"/><path d="M7 4.5v3M7 9v.5" stroke="#791F1F" stroke-width="1.2" stroke-linecap="round"/></svg>'
            : c.status === "live"
              ? '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="#B5D4F4"/><path d="M7 5v4M7 4v.5" stroke="#042C53" stroke-width="1.2" stroke-linecap="round"/></svg>'
              : '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="#C0DD97"/><path d="M4.5 7l2 2 3-3" stroke="#27500A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const insCls =
          c.status === "live" && c.days <= 2
            ? "ins-r"
            : c.status === "live"
              ? "ins-b"
              : "ins-g";

        return (
          '<div class="card ' +
          (urgCls || "") +
          '" id="cc-' +
          c.id +
          '">' +
          // header
          '<div class="card-hd">' +
          '<div class="card-logo" style="background:var(--grn-l);color:var(--grn-3);">GF</div>' +
          '<div class="card-body">' +
          '<div class="card-title">' +
          c.name +
          "</div>" +
          '<div class="card-sub">' +
          c.niche +
          " · " +
          c.loc +
          "</div>" +
          '<div class="card-pills">' +
          statusPill +
          hotPill +
          platPills +
          '<span class="pill p-loc">' +
          c.loc +
          "</span></div>" +
          '<div class="card-meta">' +
          daysLabel +
          appsLabel +
          dealsLabel +
          "</div>" +
          (c.pauseNote ? "<div>" + pauseNote + "</div>" : "") +
          "</div>" +
          '<div class="card-r"><div class="card-budget">' +
          c.budget +
          '</div><div class="card-budget-lbl">Budget range</div>' +
          (c.status === "live" && c.days <= 5
            ? '<div class="card-days">' + c.days + "d left</div>"
            : "") +
          "</div>" +
          "</div>" +
          // actions strip
          '<div class="camp-actions">' +
          actionBtns +
          '<span class="ca-note">Posted ' +
          c.name +
          "</span></div>" +
          // insight
          '<div class="insight ' +
          insCls +
          '">' +
          insightIcon +
          c.insight +
          "</div>" +
          // expand toggle
          '<div class="expand-row" onclick="toggleCamp(\'' +
          c.id +
          "')\">" +
          '<div class="expand-lbl ' +
          (isOpen ? "open" : "") +
          '"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 4.5l4 4 4-4"/></svg>' +
          (isOpen
            ? "Hide deals from this campaign"
            : "Show deals from this campaign (" + campDeals.length + ")") +
          " </div>" +
          "</div>" +
          // deals area
          '<div class="deal-area ' +
          (isOpen ? "on" : "") +
          '">' +
          dealRowsHTML +
          "</div>" +
          "</div>"
        );
      }

      // ── RENDER DEALS ──
      function renderDeals() {
        const list =
          dealFilter === "all"
            ? [...deals]
            : dealFilter === "active"
              ? deals.filter((d) => d.status === "active")
              : deals.filter((d) => d.status === "completed");

        const el = document.getElementById("deals-list");
        if (!list.length) {
          el.innerHTML =
            '<div class="empty"><div class="empty-ic"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".35"><path d="M2 5h16M2 9h16M2 13h10"/></svg></div><div class="empty-t">No deals found</div><div class="empty-s">Start a deal by reviewing and accepting applicants.</div></div>';
          return;
        }
        // sort: urgent first, then action, then ok
        const sorted = [...list].sort(function (a, b) {
          const o = { urgent: 0, action: 1, ok: 2 };
          return (o[a.urgency] || 2) - (o[b.urgency] || 2);
        });
        el.innerHTML = sorted.map((d) => buildDealCard(d)).join("");
      }

      function buildDealCard(d) {
        const stageCls =
          {
            neg: "sp-neg",
            escrow: "sp-escrow",
            work: "sp-work",
            review: "sp-review",
            released: "sp-done",
          }[d.stage] || "sp-neg";
        const cardUrgCls =
          d.urgency === "urgent"
            ? "urgent"
            : d.urgency === "action"
              ? "action"
              : "ok";

        // pipeline
        const stageNames = [
          "Accepted",
          "Terms agreed",
          "Escrow funded",
          "Content submitted",
          "Your approval",
          "Payment released",
        ];
        const pipeHTML =
          '<div class="pipeline">' +
          stageNames
            .map(function (s, i) {
              const isDone = i < d.currentStage;
              const isNow = i === d.currentStage;
              const dotCls = isDone ? "pd done" : isNow ? "pd now" : "pd";
              const lineCls = isDone ? "ps done" : "ps";
              const lblCls = isDone ? "pl done" : isNow ? "pl now" : "pl";
              const dotInner = isDone
                ? '<svg width="8" height="8" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2 2L7.5 2" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
                : isNow
                  ? '<svg width="7" height="7" viewBox="0 0 7 7"><circle cx="3.5" cy="3.5" r="2.5" fill="#378ADD"/></svg>'
                  : "";
              return (
                '<div class="' +
                lineCls +
                '"><div class="' +
                dotCls +
                '">' +
                dotInner +
                '</div><div class="' +
                lblCls +
                '">' +
                s +
                "</div></div>"
              );
            })
            .join("") +
          "</div>";

        // deliverables
        const delivHTML =
          '<div class="deliv-grid">' +
          d.deliverables
            .map(function (dv) {
              return (
                '<div class="dv"><span class="dv-name">' +
                dv.name +
                '</span><span class="dv-status ' +
                (dv.done ? "dvs-done" : "dvs-pend") +
                '">' +
                (dv.done ? "Done" : "Pending") +
                "</span></div>"
              );
            })
            .join("") +
          "</div>";

        // action button
        let mainAction = "",
          secondaryAction = "";
        if (d.stage === "review") {
          mainAction =
            '<button class="btn-r" onclick="showToast(\'Opening content review — approve to release ৳' +
            d.amt.toLocaleString() +
            "...')\">Review &amp; approve content</button>";
          secondaryAction =
            '<button class="btn-ghost" onclick="showToast(\'Requesting revision from creator...\')">Request revision</button>';
        } else if (d.stage === "escrow") {
          mainAction =
            '<button class="btn-r" onclick="showToast(\'Opening escrow payment of ৳' +
            d.amt.toLocaleString() +
            "...')\">Fund escrow ৳" +
            d.amt.toLocaleString() +
            "</button>";
          secondaryAction =
            '<button class="btn-ghost" onclick="showToast(\'Opening messages...\')">Open chat</button>';
        } else if (d.stage === "neg") {
          mainAction =
            '<button class="btn-amb" onclick="showToast(\'Opening terms negotiation...\')">Respond to proposal</button>';
          secondaryAction =
            '<button class="btn-ghost" onclick="showToast(\'Opening messages...\')">Open chat</button>';
        } else if (d.stage === "work") {
          mainAction =
            '<button class="btn-ghost" onclick="showToast(\'Opening messages...\')">Open chat</button>';
          secondaryAction = "";
        } else if (d.stage === "released") {
          mainAction =
            '<button class="btn-ghost" onclick="showToast(\'Viewing full deal receipt...\')">View receipt</button>';
          secondaryAction = d.creatorRating
            ? ""
            : '<button class="btn-g" onclick="showToast(\'Opening creator rating form...\')">Rate this creator</button>';
        }

        // receipt for completed
        let receiptHTML = "";
        if (d.stage === "released") {
          const stars = Array.from({ length: 5 }, function (_, i) {
            return i < d.creatorRating
              ? '<div class="sf"></div>'
              : '<div class="se"></div>';
          }).join("");
          receiptHTML =
            '<div class="receipt">' +
            '<div class="receipt-hd">Deal receipt</div>' +
            '<div class="receipt-row"><span class="rr-l">Campaign</span><span class="rr-v">' +
            d.campName +
            "</span></div>" +
            '<div class="receipt-row"><span class="rr-l">Platform</span><span class="rr-v">' +
            d.campPlat +
            "</span></div>" +
            '<div class="receipt-row"><span class="rr-l">Paid to creator</span><span class="rr-v">৳' +
            d.amt.toLocaleString() +
            "</span></div>" +
            '<div class="receipt-row"><span class="rr-l">Platform fee (3.5%)</span><span class="rr-v">৳' +
            Math.round(d.amt * 0.035).toLocaleString() +
            "</span></div>" +
            '<div class="receipt-row"><span class="rr-l">Total cost</span><span class="rr-v">৳' +
            Math.round(d.amt * 1.035).toLocaleString() +
            "</span></div>" +
            '<div class="receipt-row"><span class="rr-l">Paid out</span><span class="rr-v">' +
            d.paidDate +
            "</span></div>" +
            (d.creatorRating
              ? '<div class="receipt-row"><span class="rr-l">Your rating</span><span class="rr-v" style="display:flex;align-items:center;gap:4px;"><div class="stars">' +
                stars +
                "</div> " +
                d.creatorRating +
                "/5</span></div>"
              : "") +
            "</div>";
          if (d.creatorComment) {
            receiptHTML +=
              '<div style="margin:0 16px 14px;padding:9px 12px;background:var(--srf2);border-radius:var(--r1);border-left:2px solid var(--bdr-s);font-size:12px;color:var(--tx2);line-height:1.65;">' +
              '"' +
              d.creatorComment +
              '"' +
              '<div style="font-size:10px;color:var(--tx3);margin-top:4px;">— Your review of the creator</div>' +
              "</div>";
          }
        }

        // insight / urgency note
        const insIconHTML =
          d.urgency === "urgent"
            ? '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="#F7C1C1"/><path d="M7 4.5v3M7 9v.5" stroke="#791F1F" stroke-width="1.2" stroke-linecap="round"/></svg>'
            : d.urgency === "action"
              ? '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="#FAC775"/><path d="M7 4.5v3M7 9v.5" stroke="#633806" stroke-width="1.2" stroke-linecap="round"/></svg>'
              : '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="#C0DD97"/><path d="M4.5 7l2 2 3-3" stroke="#27500A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const insCls2 =
          d.urgency === "urgent"
            ? "ins-r"
            : d.urgency === "action"
              ? "ins-a"
              : "ins-g";

        return (
          '<div class="deal-card ' +
          cardUrgCls +
          '">' +
          // header
          '<div class="deal-card-hd">' +
          '<div class="dc-logo" style="background:' +
          d.logoBg +
          ";color:" +
          d.logoCol +
          ';">' +
          d.logoIn +
          "</div>" +
          '<div class="dc-main">' +
          '<div class="dc-title">' +
          d.creatorCat +
          " · " +
          d.creatorFol +
          " · " +
          d.creatorPlat +
          "</div>" +
          '<div class="dc-camp">' +
          d.campName +
          " · " +
          d.campNiche +
          "</div>" +
          '<div style="display:flex;gap:6px;"><span class="stage-pill ' +
          stageCls +
          '">' +
          d.stageLabel +
          "</span>" +
          (d.escrowHeld
            ? '<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:var(--grn-l);color:var(--grn-3);font-weight:700;">Escrow held</span>'
            : "") +
          "</div>" +
          "</div>" +
          '<div class="dc-r"><div class="dc-amt">' +
          (d.amt ? "৳" + d.amt.toLocaleString() : "TBD") +
          '</div><div class="dc-esc">' +
          (d.amt ? "Agreed amount" : "Pending") +
          "</div></div>" +
          "</div>" +
          // pipeline
          pipeHTML +
          // deliverables
          delivHTML +
          // insight
          '<div class="insight ' +
          insCls2 +
          '" style="margin:0 16px 11px;">' +
          insIconHTML +
          d.urgencyNote +
          "</div>" +
          // receipt (completed only)
          receiptHTML +
          // footer
          '<div class="deal-foot">' +
          '<div class="df-info ' +
          (d.urgency === "urgent"
            ? "red"
            : d.urgency === "action"
              ? "amb"
              : "") +
          '">Deadline: ' +
          d.deadline +
          "</div>" +
          '<div class="df-actions">' +
          secondaryAction +
          mainAction +
          "</div>" +
          "</div>" +
          "</div>"
        );
      }

      // ── INIT ──
      function showToast(msg) {
        const t = document.getElementById("toast-el");
        document.getElementById("toast-msg").textContent = msg;
        t.classList.add("on");
        setTimeout(() => t.classList.remove("on"), 2800);
      }

      renderCamps();
      renderDeals();
    </script>
  </body>
</html>
