<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SponzoBD — Applicant Review</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --red: #e24b4a;
        --red-l: #fcebeb;
        --red-m: #f7c1c1;
        --grn: #1d9e75;
        --grn-l: #eaf3de;
        --grn-m: #c0dd97;
        --grn-d: #085041;
        --grn-3: #3b6d11;
        --grn-t: #27500a;
        --teal-l: #e1f5ee;
        --teal-m: #9fe1cb;
        --blu-l: #e6f1fb;
        --blu-m: #b5d4f4;
        --blu-t: #0c447c;
        --amb-l: #faeeda;
        --amb-m: #fac775;
        --amb-t: #633806;
        --amb-d: #854f0b;
        --pur-l: #eeedfe;
        --pur-t: #3c3489;
        --bg: #f4f2ee;
        --srf: #ffffff;
        --srf2: #f0eee9;
        --bdr: rgba(0, 0, 0, 0.08);
        --bdr-m: rgba(0, 0, 0, 0.14);
        --bdr-s: rgba(0, 0, 0, 0.22);
        --tx1: #1a1a1a;
        --tx2: #555;
        --tx3: #999;
        --font: "DM Sans", system-ui, sans-serif;
        --r1: 7px;
        --r2: 10px;
        --r3: 14px;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: var(--font);
        font-size: 14px;
        color: var(--tx1);
        background: var(--bg);
      }
      .app {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* SIDEBAR */
      .sb {
        width: 220px;
        flex-shrink: 0;
        background: var(--srf);
        border-right: 1px solid var(--bdr);
        display: flex;
        flex-direction: column;
      }
      .sb-logo {
        padding: 15px 16px 12px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .logo-ic {
        width: 28px;
        height: 28px;
        background: var(--red);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sb-user {
        padding: 11px 16px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .av-s {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--blu-l);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--blu-t);
        flex-shrink: 0;
      }
      .u-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--tx1);
      }
      .u-sub {
        font-size: 11px;
        color: var(--tx3);
      }
      .u-plan {
        font-size: 11px;
        color: var(--blu-t);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
      }
      .pdot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--blu-t);
      }
      .nav {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .nav-sec {
        padding: 5px 16px 3px;
        font-size: 10px;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
      }
      .ni {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        font-size: 13px;
        color: var(--tx2);
        cursor: pointer;
        border-left: 2.5px solid transparent;
        transition: background 0.1s;
      }
      .ni:hover {
        background: var(--srf2);
      }
      .ni.on {
        background: var(--srf2);
        color: var(--tx1);
        font-weight: 600;
        border-left-color: var(--red);
      }
      .ni svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.5;
      }
      .ni.on svg {
        opacity: 1;
      }
      .ni-badge {
        margin-left: auto;
        background: var(--red);
        color: #fff;
        font-size: 10px;
        padding: 1px 7px;
        border-radius: 20px;
        font-weight: 700;
      }
      .sb-tier {
        margin: 0 10px 14px;
        padding: 10px 12px;
        background: var(--blu-l);
        border-radius: var(--r2);
      }
      .st-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .st-lbl {
        font-size: 12px;
        font-weight: 600;
        color: var(--blu-t);
      }
      .st-plan {
        font-size: 11px;
        font-weight: 700;
        color: var(--blu-t);
        background: var(--blu-m);
        padding: 1px 8px;
        border-radius: 20px;
      }
      .st-bar {
        height: 3px;
        background: rgba(0, 0, 0, 0.12);
        border-radius: 2px;
        margin: 4px 0;
      }
      .st-fill {
        height: 3px;
        background: var(--blu-t);
        border-radius: 2px;
        width: 66%;
      }
      .st-note {
        font-size: 11px;
        color: var(--blu-t);
        opacity: 0.8;
      }

      /* MAIN */
      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      .topbar {
        height: 52px;
        background: var(--srf);
        border-bottom: 1px solid var(--bdr);
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .tb-t {
        font-size: 15px;
        font-weight: 700;
        color: var(--tx1);
        letter-spacing: -0.2px;
      }
      .tb-r {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .badge-pro {
        background: var(--blu-l);
        color: var(--blu-t);
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 700;
      }

      /* CAMPAIGN BAR */
      .camp-bar {
        background: var(--srf);
        border-bottom: 1px solid var(--bdr);
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .camp-sel {
        padding: 7px 12px;
        border: 1px solid var(--bdr-m);
        border-radius: var(--r2);
        background: var(--srf);
        color: var(--tx1);
        font-size: 13px;
        font-family: var(--font);
        cursor: pointer;
        font-weight: 600;
        min-width: 300px;
      }
      .camp-sel:focus {
        outline: none;
        border-color: var(--grn);
      }
      .camp-summary {
        display: flex;
        gap: 10px;
        margin-left: auto;
      }
      .cs-item {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 600;
      }
      .cs-strong {
        background: var(--grn-l);
        color: var(--grn-3);
      }
      .cs-good {
        background: var(--teal-l);
        color: #0f6e56;
      }
      .cs-mod {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .cs-low {
        background: var(--srf2);
        color: var(--tx3);
      }

      /* TOOLBAR */
      .toolbar {
        background: var(--srf);
        border-bottom: 1px solid var(--bdr);
        padding: 9px 20px;
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      .f-chip {
        padding: 5px 12px;
        border: 1px solid var(--bdr-m);
        border-radius: 20px;
        font-size: 12px;
        color: var(--tx2);
        cursor: pointer;
        background: transparent;
        font-family: var(--font);
      }
      .f-chip:hover {
        background: var(--srf2);
      }
      .f-chip.on {
        background: var(--grn-l);
        border-color: var(--grn-m);
        color: var(--grn-3);
        font-weight: 600;
      }
      .sort-sel {
        padding: 6px 11px;
        border: 1px solid var(--bdr-m);
        border-radius: var(--r2);
        background: var(--srf);
        color: var(--tx2);
        font-size: 12px;
        font-family: var(--font);
        cursor: pointer;
      }
      .tb-right {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-left: auto;
      }
      .compare-bar {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 12px;
        background: var(--blu-l);
        border-radius: 20px;
        font-size: 12px;
        color: var(--blu-t);
        font-weight: 600;
      }
      .compare-bar span {
        font-size: 11px;
      }

      /* LAYOUT */
      .body-wrap {
        flex: 1;
        display: flex;
        overflow: hidden;
        min-height: 0;
      }
      .list-col {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 14px 20px 28px;
      }

      /* APPLICANT CARD */
      .ac {
        background: var(--srf);
        border: 1px solid var(--bdr);
        border-radius: var(--r3);
        margin-bottom: 9px;
        overflow: hidden;
        transition:
          border-color 0.12s,
          box-shadow 0.12s;
        cursor: pointer;
      }
      .ac:hover {
        border-color: var(--bdr-m);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .ac:last-child {
        margin-bottom: 0;
      }
      .ac.compare-a {
        border-color: var(--red-m);
        box-shadow: 0 0 0 2px var(--red-l);
      }
      .ac.compare-b {
        border-color: var(--pur-t);
        box-shadow: 0 0 0 2px var(--pur-l);
      }
      .ac-inner {
        padding: 13px 16px;
      }
      .ac-top {
        display: flex;
        align-items: flex-start;
        gap: 11px;
      }
      .ac-av {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .ac-body {
        flex: 1;
        min-width: 0;
      }
      .ac-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--tx1);
        margin-bottom: 2px;
      }
      .ac-niche {
        font-size: 11px;
        color: var(--tx3);
        margin-bottom: 6px;
      }
      .ac-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 7px;
      }
      .pill {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 500;
      }
      .p-plat {
        background: var(--blu-l);
        color: var(--blu-t);
      }
      .p-loc {
        background: var(--srf2);
        color: var(--tx2);
      }
      .p-deal {
        background: var(--grn-l);
        color: var(--grn-3);
      }
      .ac-stats {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .stat {
        display: flex;
        flex-direction: column;
      }
      .stat-v {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx1);
      }
      .stat-l {
        font-size: 10px;
        color: var(--tx3);
        margin-top: 1px;
      }
      .stat-v.grn {
        color: var(--grn-3);
      }
      .ac-right {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 7px;
      }
      .compat-badge {
        font-size: 11px;
        padding: 3px 11px;
        border-radius: 20px;
        font-weight: 700;
      }
      .cb-strong {
        background: var(--grn-l);
        color: var(--grn-3);
      }
      .cb-good {
        background: var(--teal-l);
        color: #0f6e56;
      }
      .cb-mod {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .cb-low {
        background: var(--srf2);
        color: var(--tx3);
      }
      .ac-note {
        font-size: 12px;
        color: var(--tx2);
        background: var(--srf2);
        border-radius: var(--r1);
        padding: 8px 11px;
        margin-top: 10px;
        line-height: 1.6;
        border-left: 2px solid var(--bdr-m);
      }
      .ac-note-lbl {
        font-size: 10px;
        color: var(--tx3);
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
      }
      .ac-footer {
        padding: 10px 16px;
        border-top: 1px solid var(--bdr);
        background: var(--srf2);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .ac-applied {
        font-size: 11px;
        color: var(--tx3);
        margin-right: auto;
      }
      .compare-check {
        width: 20px;
        height: 20px;
        border-radius: 5px;
        border: 1.5px solid var(--bdr-m);
        background: var(--srf);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.1s;
      }
      .compare-check:hover {
        border-color: var(--blu-t);
      }
      .compare-check.checked-a {
        background: var(--red);
        border-color: var(--red);
      }
      .compare-check.checked-b {
        background: var(--pur-t);
        border-color: var(--pur-t);
      }
      .compare-lbl {
        font-size: 11px;
        color: var(--tx3);
        cursor: pointer;
      }

      /* STATUS TAGS */
      .ac-status {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 600;
      }
      .st-new {
        background: var(--blu-l);
        color: var(--blu-t);
      }
      .st-shortlist {
        background: var(--amb-l);
        color: var(--amb-t);
      }
      .st-accepted {
        background: var(--grn-l);
        color: var(--grn-3);
      }
      .st-declined {
        background: var(--srf2);
        color: var(--tx3);
      }

      /* COMPAT BREAKDOWN */
      .compat-dim {
        margin-bottom: 8px;
      }
      .cd-lbl {
        font-size: 11px;
        color: var(--tx2);
        margin-bottom: 3px;
        display: flex;
        justify-content: space-between;
      }
      .cd-bar {
        height: 5px;
        background: var(--srf2);
        border-radius: 3px;
        overflow: hidden;
      }
      .cd-fill {
        height: 100%;
        border-radius: 3px;
      }

      /* COMPARE MODAL */
      .compare-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 100;
        display: none;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 0;
      }
      .compare-overlay.on {
        display: flex;
      }
      .compare-modal {
        background: var(--srf);
        width: 100%;
        max-width: 780px;
        border-radius: var(--r3) var(--r3) 0 0;
        max-height: 88vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: slideUp 0.22s ease;
      }
      @keyframes slideUp {
        from {
          transform: translateY(40px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .cm-hd {
        padding: 14px 20px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .cm-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx1);
      }
      .cm-close {
        width: 30px;
        height: 30px;
        border-radius: var(--r1);
        border: 1px solid var(--bdr-m);
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .cm-body {
        overflow-y: auto;
        padding: 16px 20px 24px;
      }
      .cm-grid {
        display: grid;
        grid-template-columns: 160px 1fr 1fr;
        gap: 0;
      }
      .cm-label-col {
        padding-top: 52px;
      }
      .cm-creator-col {
        padding: 0 10px 0 0;
      }
      .cm-creator-col:last-child {
        padding: 0 0 0 10px;
      }
      .cm-creator-hd {
        padding: 12px 14px;
        border-radius: var(--r3);
        margin-bottom: 10px;
        text-align: center;
      }
      .cc-hd-a {
        background: var(--red-l);
      }
      .cc-hd-b {
        background: var(--pur-l);
      }
      .cm-av {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        margin: 0 auto 6px;
      }
      .cm-av-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--tx1);
      }
      .cm-av-niche {
        font-size: 11px;
        color: var(--tx3);
      }
      .cm-row {
        display: grid;
        grid-template-columns: 160px 1fr 1fr;
        gap: 0;
        margin-bottom: 7px;
        align-items: center;
      }
      .cm-row-lbl {
        font-size: 11px;
        color: var(--tx3);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 8px 0;
      }
      .cm-cell {
        padding: 8px 12px;
        border-radius: var(--r2);
        text-align: center;
        margin: 2px;
      }
      .cm-val {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx1);
      }
      .cm-sub {
        font-size: 10px;
        color: var(--tx3);
        margin-top: 2px;
      }
      .cm-cell.win {
        background: var(--grn-l);
        border: 1px solid var(--grn-m);
      }
      .cm-cell.win .cm-val {
        color: var(--grn-3);
      }
      .cm-cell.neutral {
        background: var(--srf2);
      }
      .cm-cell.lose {
        background: var(--srf2);
        opacity: 0.7;
      }
      .cm-compat-row {
        display: grid;
        grid-template-columns: 160px 1fr 1fr;
        gap: 0;
        margin-bottom: 4px;
        align-items: center;
      }
      .cm-compat-bar-wrap {
        padding: 4px 12px;
      }
      .cm-compat-bar {
        height: 6px;
        background: var(--srf2);
        border-radius: 3px;
        overflow: hidden;
      }
      .cm-compat-fill {
        height: 100%;
        border-radius: 3px;
        background: var(--grn-3);
      }
      .cm-footer {
        border-top: 1px solid var(--bdr);
        padding: 14px 20px;
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }

      /* EMPTY STATE */
      .empty {
        text-align: center;
        padding: 52px 20px;
      }
      .empty-ic {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--srf);
        border: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 22px;
        right: 22px;
        background: var(--grn-d);
        color: #fff;
        padding: 10px 16px;
        border-radius: var(--r2);
        font-size: 13px;
        font-weight: 600;
        display: none;
        z-index: 300;
        align-items: center;
        gap: 7px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
      }
      .toast.on {
        display: flex;
      }

      /* ── CREATOR PROFILE MODAL (matches sponsee My Profile design) ── */
      .pm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        overflow-y: auto;
        display: none;
        padding: 24px 16px;
      }
      .pm-overlay.on {
        display: block;
      }
      .pm-wrap {
        max-width: 860px;
        margin: 0 auto;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      }
      .pm-topbar {
        background: var(--srf);
        padding: 11px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid var(--bdr);
      }
      .pm-topbar-t {
        font-size: 13px;
        font-weight: 700;
        color: var(--tx1);
      }
      .pm-topbar-r {
        display: flex;
        gap: 7px;
      }
      .pm-x {
        width: 28px;
        height: 28px;
        border-radius: var(--r1);
        border: 1px solid var(--bdr-m);
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;

      let currentCamp = "c1";
      let appFilter = "all";
      let appSort = "compat";
      let compareA = null;
      let compareB = null;

      function changeCamp(id) {
        currentCamp = id;
        clearCompare();
        renderList();
        renderSummary();
      }

      function renderSummary() {
        const apps = APPLICANTS[currentCamp] || [];
        const strong = apps.filter((a) => a.compat === "strong").length;
        const good = apps.filter((a) => a.compat === "good").length;
        const mod = apps.filter((a) => a.compat === "moderate").length;
        const low = apps.filter((a) => a.compat === "low").length;
        document.getElementById("camp-summary").innerHTML =
          '<span class="cs-item cs-strong">' +
          strong +
          " Strong</span>" +
          '<span class="cs-item cs-good">' +
          good +
          " Good</span>" +
          '<span class="cs-item cs-mod">' +
          mod +
          " Moderate</span>" +
          (low ? '<span class="cs-item cs-low">' + low + " Low</span>" : "");
      }

      function fApp(f, el) {
        appFilter = f;
        document
          .querySelectorAll("[data-f]")
          .forEach((b) => b.classList.remove("on"));
        el.classList.add("on");
        renderList();
      }

      function sortApp(v) {
        appSort = v;
        renderList();
      }

      function renderList() {
        let list = [...(APPLICANTS[currentCamp] || [])];
        if (appFilter === "strong")
          list = list.filter((a) => a.compat === "strong");
        else if (appFilter === "good")
          list = list.filter((a) => a.compat === "good");
        else if (appFilter === "shortlisted")
          list = list.filter((a) => a.status === "shortlisted");
        else if (appFilter === "accepted")
          list = list.filter((a) => a.status === "accepted");
        if (appSort === "compat")
          list.sort((a, b) => b.compatScore - a.compatScore);
        else if (appSort === "followers")
          list.sort((a, b) => b.folNum - a.folNum);
        else if (appSort === "engagement")
          list.sort((a, b) => b.engNum - a.engNum);
        const el = document.getElementById("app-list");
        if (!list.length) {
          el.innerHTML =
            '<div class="empty"><div class="empty-ic"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".4"><circle cx="9" cy="7" r="4"/><path d="M2 16c0-3.5 3-5.5 7-5.5s7 2 7 5.5"/></svg></div><div style="font-size:14px;font-weight:600;color:var(--tx1);margin-bottom:6px;">No applicants match this filter</div><div style="font-size:13px;color:var(--tx2);">Try a different filter above.</div></div>';
          return;
        }
        el.innerHTML = list.map((a) => buildCard(a)).join("");
      }

      function buildCard(a) {
        const cc = {
          strong: "cb-strong",
          good: "cb-good",
          moderate: "cb-mod",
          low: "cb-low",
        }[a.compat];
        const cl = {
          strong: "Strong match",
          good: "Good match",
          moderate: "Moderate",
          low: "Low match",
        }[a.compat];
        const platPills = a.plats
          .map((p) => '<span class="pill p-plat">' + p + "</span>")
          .join("");
        const statusHtml =
          a.status !== "pending"
            ? '<span class="ac-status ' +
              {
                shortlisted: "st-shortlist",
                accepted: "st-accepted",
                declined: "st-declined",
              }[a.status] +
              '">' +
              a.status.charAt(0).toUpperCase() +
              a.status.slice(1) +
              "</span>"
            : "";
        const isCompA = compareA && compareA.id === a.id;
        const isCompB = compareB && compareB.id === a.id;
        let cardCls = "ac";
        if (isCompA) cardCls += " compare-a";
        if (isCompB) cardCls += " compare-b";
        const checkCls = isCompA
          ? "compare-check checked-a"
          : isCompB
            ? "compare-check checked-b"
            : "compare-check";
        const checkIcon = isCompA
          ? '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2 2L8.5 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>'
          : isCompB
            ? '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2 2L8.5 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>'
            : "";
        const stars = Array.from({ length: 5 }, (_, i) =>
          i < Math.round(a.rating)
            ? '<div class="sf"></div>'
            : '<div class="se"></div>',
        ).join("");

        return (
          '<div class="' +
          cardCls +
          '" id="ac-' +
          a.id +
          '">' +
          '<div class="ac-inner" onclick="openPM(\'' +
          a.id +
          "')\">" +
          '<div class="ac-top">' +
          '<div class="ac-av" style="background:' +
          a.avBg +
          ";color:" +
          a.avCol +
          ';">' +
          a.avIn +
          "</div>" +
          '<div class="ac-body">' +
          '<div class="ac-name">' +
          a.name +
          (statusHtml ? " " + statusHtml : "") +
          "</div>" +
          '<div class="ac-niche">' +
          a.niche +
          " · " +
          a.loc +
          "</div>" +
          '<div class="ac-pills">' +
          platPills +
          '<span class="pill p-loc">' +
          a.loc +
          "</span>" +
          (a.deals > 0
            ? '<span class="pill p-deal">' +
              a.deals +
              " deals · " +
              a.rating +
              "★</span>"
            : "") +
          "</div>" +
          '<div class="ac-stats">' +
          '<div class="stat"><div class="stat-v">' +
          a.fol +
          '</div><div class="stat-l">Followers</div></div>' +
          '<div class="stat"><div class="stat-v grn">' +
          a.eng +
          '</div><div class="stat-l">Engagement</div></div>' +
          '<div class="stat"><div class="stat-v">' +
          a.deals +
          '</div><div class="stat-l">Deals done</div></div>' +
          "</div>" +
          "</div>" +
          '<div class="ac-right">' +
          '<span class="compat-badge ' +
          cc +
          '">' +
          cl +
          " · " +
          a.compatScore +
          "</span>" +
          '<div style="display:flex;gap:5px;">' +
          '<button class="btn-ghost-s" onclick="event.stopPropagation();openDetail(\'' +
          a.id +
          "')\">View profile</button>" +
          "</div>" +
          '<div class="dh-stars">' +
          stars +
          "</div>" +
          "</div>" +
          "</div>" +
          '<div class="ac-note"><div class="ac-note-lbl">Application note</div>' +
          a.note +
          "</div>" +
          "</div>" +
          '<div class="ac-footer">' +
          '<span class="ac-applied">Applied ' +
          a.applied +
          "</span>" +
          (a.status === "accepted"
            ? '<span style="font-size:11px;color:var(--grn-3);font-weight:700;display:flex;align-items:center;gap:4px;"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l2 2L9.5 2" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round"/></svg>Accepted</span>'
            : a.status === "shortlisted"
              ? '<button class="btn-r" onclick="event.stopPropagation();acceptApp(\'' +
                a.id +
                '\')">Accept</button><button class="btn-ghost-s" onclick="event.stopPropagation();declineApp(\'' +
                a.id +
                "')\">Decline</button>"
              : '<button class="btn-r" onclick="event.stopPropagation();acceptApp(\'' +
                a.id +
                '\')">Accept</button><button class="btn-amb" onclick="event.stopPropagation();shortlistApp(\'' +
                a.id +
                '\')">Shortlist</button><button class="btn-ghost-s" onclick="event.stopPropagation();declineApp(\'' +
                a.id +
                "')\">Decline</button>") +
          '<div style="display:flex;align-items:center;gap:5px;margin-left:8px;" onclick="event.stopPropagation();">' +
          '<div class="' +
          checkCls +
          '" onclick="toggleCompare(\'' +
          a.id +
          "')\">" +
          checkIcon +
          "</div>" +
          '<span class="compare-lbl" onclick="toggleCompare(\'' +
          a.id +
          "')\">Compare</span>" +
          "</div>" +
          "</div>" +
          "</div>"
        );
      }

      function toggleCompare(id) {
        const apps = APPLICANTS[currentCamp] || [];
        const a = apps.find((x) => x.id === id);
        if (!a) return;
        if (compareA && compareA.id === id) {
          compareA = null;
        } else if (compareB && compareB.id === id) {
          compareB = null;
        } else if (!compareA) {
          compareA = a;
        } else if (!compareB) {
          compareB = a;
        } else {
          T("Max 2 creators can be compared at once · clear one first");
          return;
        }
        updateCompareBar();
        renderList();
      }

      function updateCompareBar() {
        const bar = document.getElementById("compare-bar");
        const count = (compareA ? 1 : 0) + (compareB ? 1 : 0);
        if (count === 0) {
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        document.getElementById("compare-count").textContent =
          count === 1 ? "1 selected · pick 1 more" : "2 selected";
      }

      function clearCompare() {
        compareA = null;
        compareB = null;
        updateCompareBar();
        renderList();
      }

        if (!compareA || !compareB) {
          T("Select 2 creators to compare");
          return;
        }
        const a = compareA,
          b = compareB;
        const metrics = [
          {
            lbl: "Followers",
            va: a.fol,
            vb: b.fol,
            win: a.folNum > b.folNum ? "a" : b.folNum > a.folNum ? "b" : "tie",

            lbl: "Engagement rate",
            va: a.eng,
            vb: b.eng,
            win: a.engNum > b.engNum ? "a" : b.engNum > a.engNum ? "b" : "tie",
          },
          {
            lbl: "Deals completed",
            va: a.deals + " deals",
            vb: b.deals + " deals",
            win: a.deals > b.deals ? "a" : b.deals > a.deals ? "b" : "tie",
          },
          {
            lbl: "Avg rating",
            va: a.rating + "★",
            vb: b.rating + "★",
            win: a.rating > b.rating ? "a" : b.rating > a.rating ? "b" : "tie",
          },
          {
            lbl: "Compat score",
            va: a.compatScore,
            vb: b.compatScore,
            win:
              a.compatScore > b.compatScore
                ? "a"
                : b.compatScore > a.compatScore
                  ? "b"
                  : "tie",
          },
          { lbl: "Location", va: a.loc, vb: b.loc, win: "tie" },
          {
            lbl: "Platforms",
            va: a.plats.join(", "),
            vb: b.plats.join(", "),
            win: "tie",
          },
        ];
        const dimLabels = [
          "Niche",
          "Audience",
          "Budget",
          "Followers",
          "Platform",
        ];
        let html =
          '<div class="cm-grid">' +
          // headers
          "<div></div>" +
          '<div class="cm-creator-col"><div class="cm-creator-hd cc-hd-a"><div class="cm-av" style="background:' +
          a.avBg +
          ";color:" +
          a.avCol +
          ';">' +
          a.avIn +
          '</div><div class="cm-av-name">' +
          a.name +
          '</div><div class="cm-av-niche">' +
          a.niche +
          "</div></div></div>" +
          '<div class="cm-creator-col"><div class="cm-creator-hd cc-hd-b"><div class="cm-av" style="background:' +
          b.avBg +
          ";color:" +
          b.avCol +
          ';">' +
          b.avIn +
          '</div><div class="cm-av-name">' +
          b.name +
          '</div><div class="cm-av-niche">' +
          b.niche +
          "</div></div></div>" +
          "</div>";
        // metric rows
        html += metrics
          .map((m) => {
            const winA = m.win === "a",
              winB = m.win === "b";
            return (
              '<div class="cm-row">' +
              '<div class="cm-row-lbl">' +
              m.lbl +
              "</div>" +
              '<div class="cm-cell ' +
              (winA ? "win" : "neutral") +
              '"><div class="cm-val">' +
              m.va +
              "</div></div>" +
              '<div class="cm-cell ' +
              (winB ? "win" : "neutral") +
              '"><div class="cm-val">' +
              m.vb +
              "</div></div>" +
              "</div>"
            );
          })
          .join("");
        // compat bars
        html +=
          '<div class="cm-row"><div class="cm-row-lbl" style="padding-top:14px;">Compat breakdown</div><div></div><div></div></div>';
        dimLabels.forEach((l, i) => {
          const va = a.dims[i],
            vb = b.dims[i],
            max = [25, 25, 20, 15, 15][i];
          html +=
            '<div class="cm-compat-row">' +
            '<div style="font-size:11px;color:var(--tx3);padding:0 0 0 0;">' +
            l +
            "</div>" +
            '<div class="cm-compat-bar-wrap"><div class="cm-compat-bar"><div class="cm-compat-fill" style="width:' +
            Math.round((va / max) * 100) +
            '%;"></div></div><div style="font-size:10px;color:var(--tx3);margin-top:2px;">' +
            va +
            "/" +
            max +
            "</div></div>" +
            '<div class="cm-compat-bar-wrap"><div class="cm-compat-bar"><div class="cm-compat-fill" style="width:' +
            Math.round((vb / max) * 100) +
            '%;background:var(--pur-t);"></div></div><div style="font-size:10px;color:var(--tx3);margin-top:2px;">' +
            vb +
            "/" +
            max +
            "</div></div>" +
            "</div>";
        });
        document.getElementById("cm-body").innerHTML = html;
        document.getElementById("cm-footer").innerHTML =
          '<button class="btn-r" style="flex:1;" onclick="acceptApp(\'' +
          a.id +
          "');closeCompare();\">Accept " +
          a.name +
          "</button>" +
          '<button class="btn-r" style="flex:1;background:var(--pur-t);border-color:var(--pur-t);" onclick="acceptApp(\'' +
          b.id +
          "');closeCompare();\">Accept " +
          b.name +
          "</button>" +
          '<button class="btn-ghost" onclick="closeCompare()">Close</button>';
        document.getElementById("compare-overlay").classList.add("on");
      }

      function closeCompare() {
        document.getElementById("compare-overlay").classList.remove("on");
      }
      function handleOverlayClick(e) {
        if (e.target === document.getElementById("compare-overlay"))
          closeCompare();
      }

      function acceptApp(id) {
        const apps = APPLICANTS[currentCamp];
        const a = apps && apps.find((x) => x.id === id);
        if (a) {
          a.status = "accepted";
          renderList();
          T(a.name + " accepted — opening chat in Messages");
        }
      }
      function shortlistApp(id) {
        const apps = APPLICANTS[currentCamp];
        const a = apps && apps.find((x) => x.id === id);
        if (a && a.status === "pending") {
          a.status = "shortlisted";
          renderList();
          T(a.name + " shortlisted");
        }
      }
      function declineApp(id) {
        const apps = APPLICANTS[currentCamp];
        const a = apps && apps.find((x) => x.id === id);
        if (a) {
          a.status = "declined";
          renderList();
          T("Decline sent — creator notified politely");
        }
      }

      function T(m) {
        const t = document.getElementById("tst");
        document.getElementById("tm").textContent = m;
        t.classList.add("on");
        setTimeout(() => t.classList.remove("on"), 2800);
      }

      renderList();
      renderSummary();
    </script>
  </body>
</html>
